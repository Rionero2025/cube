databases:
  - name: cube-postgres
    databaseName: cube_management_contract
    user: cube_user
    region: frankfurt
    ipAllowList: []

services:
  - type: web
    name: cube-management-contract
    env: docker
    region: frankfurt
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cube-postgres
          property: connectionString
