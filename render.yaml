databases:
  - name: cube-postgres
    databaseName: cube_management_contract
    user: cube_user
    plan: starter
    region: frankfurt

services:
  - type: web
    name: cube-management-contract
    env: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cube-postgres
          property: connectionString
